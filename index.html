<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memories</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Josefin+Sans:wght@100;300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --cream: #f0e8d8; --gold: #c9a84c; --dark: #080808; }
  html, body { width: 100%; height: 100%; background: var(--dark); color: var(--cream); font-family: 'Josefin Sans', sans-serif; overflow: hidden; }
  body::after { content: ''; position: fixed; inset: 0; z-index: 100; pointer-events: none; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.035'/%3E%3C/svg%3E"); background-size: 256px; opacity: 0.4; }
  #loading { position: fixed; inset: 0; z-index: 50; display: flex; flex-direction: column; align-items: center; justify-content: center; background: var(--dark); }
  .load-title { font-family: 'Cormorant Garamond', serif; font-size: clamp(3rem, 6vw, 5rem); font-weight: 300; font-style: italic; color: var(--cream); letter-spacing: -0.02em; margin-bottom: 16px; }
  .load-sub { font-size: 0.62rem; font-weight: 100; letter-spacing: 0.3em; text-transform: uppercase; color: rgba(201,168,76,0.6); animation: pulse 2s ease-in-out infinite; }
  .load-bar { width: 160px; height: 1px; background: rgba(201,168,76,0.15); position: relative; overflow: hidden; margin-top: 28px; }
  .load-bar::after { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: var(--gold); animation: slide 1.4s ease-in-out infinite; }
  .load-error { font-size: 0.7rem; color: #e07070; letter-spacing: 0.08em; margin-top: 24px; max-width: 420px; text-align: center; line-height: 1.8; display: none; font-weight: 300; }
  .retry-btn { margin-top: 20px; background: transparent; border: 1px solid rgba(201,168,76,0.3); color: var(--gold); font-family: 'Josefin Sans', sans-serif; font-size: 0.6rem; letter-spacing: 0.25em; text-transform: uppercase; padding: 10px 24px; cursor: pointer; display: none; transition: all 0.2s; }
  .retry-btn:hover { border-color: var(--gold); }
  #slideshow { position: fixed; inset: 0; z-index: 10; }
  .photo-layer { position: absolute; inset: 0; background-size: contain; background-position: center; background-repeat: no-repeat; opacity: 0; transition: opacity 1.8s ease; }
  .photo-layer.visible { opacity: 1; }
  #slideshow::before { content: ''; position: absolute; inset: 0; z-index: 2; background: radial-gradient(ellipse at center, transparent 35%, rgba(0,0,0,0.55) 100%); pointer-events: none; }
  #slideshow::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 55%; z-index: 2; background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, transparent 100%); pointer-events: none; }
  #info { position: absolute; bottom: 0; left: 0; right: 0; z-index: 5; padding: 52px 80px; display: flex; align-items: flex-end; justify-content: space-between; }
  .time-block { max-width: 65%; }
  .time-ago { font-family: 'Cormorant Garamond', serif; font-size: clamp(3rem, 7vw, 6.5rem); font-weight: 300; font-style: italic; color: var(--cream); line-height: 1; letter-spacing: -0.02em; text-shadow: 0 2px 48px rgba(0,0,0,0.9); opacity: 0; transform: translateY(14px); transition: opacity 0.9s ease 0.3s, transform 0.9s ease 0.3s; }
  .time-ago.show { opacity: 1; transform: translateY(0); }
  .exact-date { font-size: clamp(0.55rem, 1.1vw, 0.8rem); font-weight: 100; letter-spacing: 0.3em; text-transform: uppercase; color: var(--gold); margin-top: 16px; text-shadow: 0 1px 12px rgba(0,0,0,0.95); opacity: 0; transition: opacity 0.9s ease 0.5s; }
  .exact-date.show { opacity: 1; }
  .hud { text-align: right; opacity: 0; transition: opacity 0.9s ease 0.4s; }
  .hud.show { opacity: 1; }
  .hud-time { font-family: 'Cormorant Garamond', serif; font-size: clamp(1.6rem, 3.2vw, 2.4rem); font-weight: 300; color: var(--cream); text-shadow: 0 1px 12px rgba(0,0,0,0.95); }
  .hud-sub { font-size: 0.56rem; font-weight: 100; letter-spacing: 0.24em; text-transform: uppercase; color: rgba(240,232,216,0.38); margin-top: 6px; }
  .hud-count { font-size: 0.5rem; font-weight: 100; letter-spacing: 0.2em; color: rgba(240,232,216,0.22); margin-top: 10px; }
  #kb { position: absolute; top: 40px; right: 52px; z-index: 5; font-size: 0.48rem; font-weight: 100; letter-spacing: 0.18em; color: rgba(240,232,216,0.15); text-transform: uppercase; text-align: right; line-height: 2.4; }
  @keyframes pulse { 0%,100%{opacity:.4} 50%{opacity:1} }
  @keyframes slide { 0%{left:-100%} 50%{left:0%} 100%{left:100%} }
</style>
</head>
<body>

<div id="loading">
  <div class="load-title">Memories</div>
  <div class="load-sub" id="loadSub">Loading your photos</div>
  <div class="load-bar" id="loadBar"></div>
  <div class="load-error" id="loadError"></div>
  <button class="retry-btn" id="retryBtn" onclick="init()">Try Again</button>
</div>

<div id="slideshow" style="display:none">
  <div class="photo-layer" id="layerA"></div>
  <div class="photo-layer" id="layerB"></div>
  <div id="kb">← → Navigate &nbsp;&nbsp; Space Next<br>F Fullscreen</div>
  <div id="info">
    <div class="time-block">
      <div class="time-ago" id="timeAgo"></div>
      <div class="exact-date" id="exactDate"></div>
    </div>
    <div class="hud" id="hud">
      <div class="hud-time" id="hudTime"></div>
      <div class="hud-sub" id="hudDate"></div>
      <div class="hud-count" id="hudCount"></div>
    </div>
  </div>
</div>

<script>
let photos=[], currentIndex=0, activeLayer='A', slideTimer=null, clockTimer=null;
const SLIDE_DURATION = 10000;

async function init() {
  document.getElementById('loading').style.display='flex';
  document.getElementById('slideshow').style.display='none';
  document.getElementById('loadError').style.display='none';
  document.getElementById('retryBtn').style.display='none';
  document.getElementById('loadBar').style.display='block';
  document.getElementById('loadSub').textContent='Loading your photos';

  try {
    const resp = await fetch('/api/photos');
    const data = await resp.json();
    if (data.error && !data.photos?.length) throw new Error(data.error);

    photos = (data.photos || []).filter(p => p.url);
    shuffle(photos);
    if (!photos.length) throw new Error('No photos found in the album.');

    document.getElementById('loadSub').textContent = photos.length + ' photos loaded';
    document.getElementById('loadBar').style.display = 'none';

    setTimeout(() => {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('slideshow').style.display = 'block';
      currentIndex=0; activeLayer='A';
      showPhoto(0);
      startClock();
    }, 600);

  } catch(e) {
    document.getElementById('loadBar').style.display='none';
    document.getElementById('loadSub').textContent='Something went wrong';
    document.getElementById('loadError').textContent = e.message;
    document.getElementById('loadError').style.display='block';
    document.getElementById('retryBtn').style.display='block';
  }
}

function showPhoto(index) {
  if (!photos.length) return;
  currentIndex = ((index % photos.length) + photos.length) % photos.length;
  const photo = photos[currentIndex];
  ['timeAgo','exactDate','hud'].forEach(id => document.getElementById(id).classList.remove('show'));
  const inId = activeLayer==='A' ? 'layerA' : 'layerB';
  const outId = activeLayer==='A' ? 'layerB' : 'layerA';
  const img = new Image();
  img.onload = () => {
    document.getElementById(inId).style.backgroundImage = `url('${photo.url}=w1920-h1080')`;
    document.getElementById(inId).classList.add('visible');
    document.getElementById(outId).classList.remove('visible');
    activeLayer = activeLayer==='A' ? 'B' : 'A';
    setTimeout(() => {
      const ta = document.getElementById('timeAgo');
      const ed = document.getElementById('exactDate');
      if (photo.date) {
        ta.textContent = relativeTime(photo.date);
        ed.textContent = formatDate(photo.date);
      } else {
        ta.textContent = '';
        ed.textContent = 'Date unknown';
      }
      ta.classList.add('show');
      ed.classList.add('show');
      document.getElementById('hudCount').textContent = (currentIndex+1) + ' of ' + photos.length;
      document.getElementById('hud').classList.add('show');
    }, 400);
  };
  img.onerror = () => showPhoto(currentIndex + 1);
  img.src = photo.url + '=w1920-h1080';
  clearTimeout(slideTimer);
  slideTimer = setTimeout(() => showPhoto(currentIndex + 1), SLIDE_DURATION);
}

function relativeTime(iso) {
  if (!iso) return '';
  const d = new Date(iso), now = new Date();
  const ms = now - d, hrs = ms/3600000, days = ms/86400000;
  if (hrs < 1) return 'Just now';
  if (hrs < 48) { const h=Math.floor(hrs); return h+(h===1?' hour ago':' hours ago'); }
  if (days < 14) { const dd=Math.floor(days); return dd+(dd===1?' day ago':' days ago'); }
  if (days < 60) { const w=Math.floor(days/7); return w+(w===1?' week ago':' weeks ago'); }
  const mo = (now.getFullYear()-d.getFullYear())*12+(now.getMonth()-d.getMonth());
  if (mo < 12) return mo+(mo===1?' month ago':' months ago');
  const y=Math.floor(mo/12), r=mo%12;
  if (r===0) return y+(y===1?' year ago':' years ago');
  return y+(y===1?' year, ':' years, ')+r+(r===1?' month ago':' months ago');
}

function formatDate(iso) {
  if (!iso) return '';
  return new Date(iso).toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'}).toUpperCase();
}

function startClock() {
  updateClock();
  clearInterval(clockTimer);
  clockTimer = setInterval(updateClock, 1000);
}

function updateClock() {
  const now = new Date();
  document.getElementById('hudTime').textContent = now.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:true});
  document.getElementById('hudDate').textContent = now.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'}).toUpperCase();
}

document.addEventListener('keydown', e => {
  if (document.getElementById('slideshow').style.display!=='block') return;
  if (e.key==='ArrowRight'||e.key===' ') { clearTimeout(slideTimer); showPhoto(currentIndex+1); }
  else if (e.key==='ArrowLeft') { clearTimeout(slideTimer); showPhoto(currentIndex-1); }
  else if (e.key==='f'||e.key==='F') { !document.fullscreenElement ? document.documentElement.requestFullscreen() : document.exitFullscreen(); }
});

function shuffle(a) { for (let i=a.length-1;i>0;i--) { const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]; } }

init();
</script>
</body>
</html>
